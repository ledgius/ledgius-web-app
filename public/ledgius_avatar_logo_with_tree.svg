<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="lGrad" x1="320" y1="260" x2="760" y2="760" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFB000"/>
      <stop offset="55%" stop-color="#FF8A00"/>
      <stop offset="100%" stop-color="#FF6A00"/>
    </linearGradient>

    <linearGradient id="bar1" x1="0" y1="720" x2="0" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0A6DFF"/>
      <stop offset="100%" stop-color="#3FD0FF"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="720" x2="0" y2="450" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0F97FF"/>
      <stop offset="100%" stop-color="#39E5E2"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0" y1="720" x2="0" y2="350" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22D6D7"/>
      <stop offset="100%" stop-color="#E7F52F"/>
    </linearGradient>

    <linearGradient id="trunkGrad" x1="650" y1="0" x2="710" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#B56A2B"/>
      <stop offset="100%" stop-color="#8A4513"/>
    </linearGradient>

    <radialGradient id="leafGrad1" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#C8FF36"/>
      <stop offset="55%" stop-color="#67C91D"/>
      <stop offset="100%" stop-color="#2F8F12"/>
    </radialGradient>
    <radialGradient id="leafGrad2" cx="45%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#B5FF2A"/>
      <stop offset="60%" stop-color="#54B718"/>
      <stop offset="100%" stop-color="#267E10"/>
    </radialGradient>

    <filter id="shadow" x="-20%" y="-20%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#0F172A" flood-opacity="0.18"/>
    </filter>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="24" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1024" height="1024" fill="#FFFFFF"/>

  <!-- subtle glow backing -->
  <g opacity="0.22" filter="url(#softGlow)">
    <ellipse cx="455" cy="625" rx="230" ry="190" fill="#FF9A00"/>
    <ellipse cx="610" cy="550" rx="170" ry="150" fill="#7BFF2A"/>
    <ellipse cx="520" cy="590" rx="180" ry="150" fill="#2DE2FF"/>
  </g>

  <!-- orange L -->
  <g filter="url(#shadow)">
    <rect x="360" y="250" width="150" height="470" rx="18" fill="url(#lGrad)" transform="skewX(-6)"/>
    <rect x="345" y="635" width="425" height="100" rx="18" fill="url(#lGrad)" transform="skewX(-6)"/>
  </g>

  <!-- bars with spacing from L -->
  <g filter="url(#shadow)">
    <rect x="470" y="535" width="54" height="145" rx="14" fill="url(#bar1)"/>
    <rect x="555" y="470" width="58" height="210" rx="14" fill="url(#bar2)"/>
    <rect x="640" y="390" width="66" height="290" rx="14" fill="url(#bar3)"/>
  </g>

  <!-- mini tree in top right -->
  <g filter="url(#shadow)">
    <path d="M712 435
             C724 405, 741 390, 755 365
             C767 386, 775 408, 781 435
             L771 478
             C760 470, 748 470, 737 478
             Z"
          fill="url(#trunkGrad)"/>
    <ellipse cx="735" cy="340" rx="55" ry="38" fill="url(#leafGrad1)"/>
    <ellipse cx="780" cy="350" rx="48" ry="34" fill="url(#leafGrad2)"/>
    <ellipse cx="700" cy="365" rx="44" ry="30" fill="url(#leafGrad2)"/>
    <ellipse cx="755" cy="385" rx="58" ry="38" fill="url(#leafGrad1)"/>
    <ellipse cx="805" cy="390" rx="35" ry="25" fill="url(#leafGrad2)"/>
  </g>
</svg>
