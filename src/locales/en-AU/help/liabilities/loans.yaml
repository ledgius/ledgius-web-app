page: /loans
title: Loan Register
spec: R-0063
sections:
  - heading: What is this?
    body: >
      Your loan register — every financing arrangement your business has
      taken on. Bank term loans, chattel mortgages for vehicles and
      equipment, business lines of credit, related-party loans. Each
      loan carries its original amount, current principal balance,
      interest rate, repayment schedule, and {{term:GL}} liability
      account.

  - heading: Interest accrual vs payments
    body: >
      Interest and principal move through the books at different times.
      **Accrual** (monthly by default) recognises interest accumulating
      daily on the outstanding balance — debits Interest Expense, credits
      an Accrued Interest Payable liability. **Payments** then clear that
      accrued interest plus reduce the principal liability. For cash-
      basis tenants, interest is posted direct-to-expense on payment and
      accrual runs are skipped.

  - heading: When to pay out early
    body: >
      Early payout makes sense when (a) the interest saved over the
      remaining term exceeds any early-termination fee, (b) you have
      surplus cash with nowhere more productive to deploy it, or (c) the
      loan is on a variable rate that's climbing. The Payout form
      previews the savings vs termination fee for you — but it's
      information-only, not a journal entry.

  - heading: Use of funds and deductibility
    body: >
      Each loan carries a **use-of-funds** label: `business`, `mixed`, or
      `private`. Interest on fully-business borrowings is deductible
      under s8-1 ITAA 1997. {{warn:Mixed-use loans require apportionment}}
      per TR 95/25 — the tax layer (R-0073, forthcoming) reads the
      loan's business-use percentage and computes the deductible portion
      at year-end. The accounting journal posts the full interest
      expense unconditionally; tax deductibility is a separate layer.

  - heading: Annual estimate review
    body: >
      For variable-rate loans, review the current rate at each year-end
      and use Change Estimate on the loan detail page when the rate or
      remaining term has moved. Under AASB 108 this is a prospective
      change — it does not restate past interest. A reminder calendar
      lands with R-0072.

  - heading: Common loan types
    body: >
      - **Term loan** — fixed principal, fixed or variable rate
      - **Chattel mortgage** — loan secured against a specific vehicle or equipment
      - **Business line of credit** — revolving facility (v1 tracks a static balance)
      - **Related-party loan** — loan from shareholder, director, or associated entity
      - **Division 7A loan** — private-company loan to a shareholder (separate module when built)

  - heading: Policies
    body: >
      - ITAA 1997 s8-1 — General deductions (interest on business borrowings)
      - TR 95/25 — Apportionment of interest on mixed-use borrowings
      - ITAA 1997 s40-5 — Input-taxed supplies (interest is GST input-taxed)
      - AASB 9 — Financial Instruments (loan measurement)
      - AASB 108 — Changes in estimates, errors, correction paths
      - AASB 116 §68 — gain on derecognition (for debt forgiveness)
