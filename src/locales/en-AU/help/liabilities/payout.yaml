page: /loans/payout
title: Loan Payout
spec: R-0063
sections:
  - heading: What is this?
    body: >
      Close out a loan with a final settlement — principal cleared,
      accrued interest settled (plus pro-rata to the payout date if
      needed), and any early-termination fee posted. The loan moves to
      status {{good:PaidOut}} and remains in the register for audit.

  - heading: Pro-rata interest
    body: >
      If your payout date falls between the last posted interest
      accrual and today, the system posts a pro-rata accrual covering
      the partial period {{good:first}}, then the payout journal that
      clears everything. Both happen in the same DB transaction, so
      your books are never momentarily wrong. Cash-basis tenants skip
      this step — interest is recognised directly in the payout
      journal.

  - heading: Termination fee
    body: >
      Some lenders charge a fee for early payout. Enter it on the form
      and it posts as a **sibling** journal
      (`loan_termination_fee`) — debit Termination Fee Expense, credit
      the nominated bank account — rather than as a child of the
      payout. That separation keeps the BAS extractor clean: the fee
      may carry GST depending on the lender, while the loan payout
      itself doesn't.

  - heading: Savings vs remaining term — information only
    body: >
      The payout preview shows an estimated interest saving (sum of
      projected interest on the remaining scheduled term less the
      termination fee) to help you decide. {{warn:This is informational
      only — it is not a journal entry.}} It helps answer "is paying
      this out early actually cheaper than riding it out?" — the
      figure does NOT hit the ledger in any way.

  - heading: BAS treatment
    body: >
      Interest on the loan is a GST input-taxed supply (s40-5 ITAA),
      so the interest leg does not flow to BAS G10/G11/1A/1B. The
      early-termination fee MAY carry GST depending on the lender —
      check their statement and pick the right tax code on the fee
      line. BAS derivation runs in A-0042's extraction layer, not
      driven by labels baked on GL rows.

  - heading: After payout
    body: >
      The loan stays visible in the register with status `PaidOut`
      and a zero balance by default — filtered out of the Active view,
      toggled back on via "Show paid-out" on the register. The full
      payment + accrual history remains for audit queries.

  - heading: Policies
    body: >
      - ITAA 1997 s8-1 — Interest deductibility (including on payout-
        date pro-rata interest)
      - ITAA 1997 s40-5 — Input-taxed financial supplies (GST)
      - National Credit Code — Early termination rights
      - ASIC guidance on early repayment fees
      - AASB 9 — Derecognition of a financial liability
