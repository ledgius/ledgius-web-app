page: /assets/sell
title: Sell / Dispose Asset
spec: R-0062
sections:
  - heading: What is this?
    body: >
      Record the sale, scrapping, donation, or trade-in of a fixed
      asset. The system calculates the accounting gain or loss and
      creates the closing {{term:GL}} entries in a single atomic
      posting.

  - heading: Accounting gain/loss vs tax outcome
    body: >
      {{warn:The figure shown on this page is the accounting
      gain/loss per AASB 116 §68.}} It is posted to "Other Income" or
      "Other Expense" — not operating revenue. This is NOT the tax
      outcome: income-tax Division 40 balancing adjustment,
      {{term:CGT}} s118-24 component for any non-taxable-use portion,
      and pre-CGT asset treatment are computed in a separate tax
      layer at {{term:ITR}} time (see R-0073). Don't expect the two
      numbers to match.

  - heading: Pro-rata depreciation
    body: >
      If you dispose of an asset mid-period (between the last posted
      depreciation run and the disposal date), the system posts a
      final pro-rata depreciation entry first — covering the days
      from last-run to disposal — then posts the disposal journal.
      Both entries are created in the same database transaction so
      the books are never momentarily wrong.

  - heading: Four disposal reasons
    body: >
      - **Sold** — asset exchanged for cash or receivable. Creates an
        AR/bank debit for the sale proceeds.
      - **Scrapped** — asset written off with zero proceeds. Often
        results in a loss equal to the remaining book value.
      - **Donated** — asset given away at nil value.
      - **Traded In** — asset used as part-payment for a replacement.
        Trade-in value becomes the sale proceeds.

  - heading: BAS treatment
    body: >
      Sales of capital assets flow to BAS G1 (total sales) and 1A
      (GST on sales) automatically via the BAS extraction layer. No
      user action required — the tax code on the sale line does the
      work.

  - heading: Policies
    body: >
      - AASB 116 §67–72 — Derecognition of PPE
      - AASB 116 §68 — gain/loss on derecognition is NOT revenue
      - ITAA 1997 s40-285 — Division 40 balancing adjustment
      - ITAA 1997 s118-24 — CGT on depreciating assets (non-taxable-use portion)
      - ATO guide to capital gains for small business
