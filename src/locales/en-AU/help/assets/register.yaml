page: /assets
title: Asset Register
spec: R-0062
sections:
  - heading: What is this?
    body: >
      Your fixed asset register — every capital item your business owns.
      Plant, equipment, vehicles, computers, furniture. Each asset carries
      its purchase cost, depreciation method, and current book value.

  - heading: Why it matters
    body: >
      {{warn:The ATO requires you to track every depreciating asset.}}
      Depreciation reduces your taxable income, and the instant asset
      write-off threshold changes annually. Getting this wrong means
      overpaying tax or facing audit adjustments.

  - heading: How depreciation works
    body: >
      Each asset has a depreciation method — Straight Line, Diminishing
      Value, or Instant Write-off. Periodic depreciation reduces the
      asset's book value and posts a matching P&L expense. The register
      updates after every depreciation run.

  - heading: When to dispose
    body: >
      When you sell, scrap, donate, or trade an asset in, use
      {{good:Dispose}} on the detail page to post the disposal journal.
      The system calculates the accounting gain or loss and moves the
      asset to the Disposed state. Disposed assets stay in the register
      for audit (filtered by default — toggle "Show disposed" to see them).

  - heading: Annual estimate review
    body: >
      AASB 116 §51 requires you to review useful life and residual value
      at least once per financial year. Changes flow through the Change
      Depreciation Estimate command — they are prospective only and do
      not reverse past depreciation. The year-end review workflow is a
      separate spec (R-0072); the underlying command is already in place.

  - heading: Categories
    body: >
      - **Plant & Equipment** — tools, machinery, workshop gear
      - **Motor Vehicles** — cars, utes, trucks (links to Vehicle Logbook)
      - **Office Equipment** — desks, chairs, fit-out
      - **IT Equipment** — computers, servers, software licences
      - **Furniture & Fittings** — shelving, display units

  - heading: Policies
    body: >
      - ATO TR 2022/1 — Depreciation of depreciating assets
      - ITAA 1997 Division 40 — Capital allowances
      - AASB 116 — Property, Plant and Equipment
      - AASB 108 — Accounting policies, estimate changes, errors
      - ATO Instant Asset Write-off thresholds (check annually)
